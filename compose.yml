################################################################################
# Docker Compose configuration for About Time
#
################################################################################

################################################################################
# Networks
################################################################################
networks:
  about-time-network:
    driver: bridge

################################################################################
# Volumes
################################################################################
volumes:
  dbdata:
    driver: local

################################################################################
# Services
################################################################################
services:
  db:
    container_name: about-time-db
    restart: unless-stopped
    image: postgres:${POSTGRES_VERSION:-18-bookworm}
    # Credentials fall back to dev defaults; override via .env for anything real.
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-about-time}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-about-time}
      - POSTGRES_DB=${POSTGRES_DB:-about-time}
    networks:
      - about-time-network
    # Named volume keeps data across container recreation (see `make clean` to wipe).
    volumes:
      - dbdata:/var/lib/postgresql:delegated
    # Exposed on the host for local DB tooling; drop this in production.
    ports:
      - 5432:5432
    # Gates the app's startup via the depends_on condition below.
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-about-time}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    container_name: about-time
    restart: unless-stopped
    networks:
      - about-time-network
    environment:
      - TZ=${TZ:-UTC}
      - PUID=1000
      - GUID=1000
    volumes:
      - ./logs:/var/logs
    # Built from the local Dockerfile; PUID/PGID align container user with host ids.
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUID: 1000
        GUID: 1000
    # Wait for Postgres to pass its healthcheck before starting (avoids migration races).
    depends_on:
      db:
        condition: service_healthy

